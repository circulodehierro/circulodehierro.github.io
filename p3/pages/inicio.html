<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="../css/inicio.css">
    <link rel="icon" type="image/png" href="../images/logo1.svg"/>
    <script src="../js/inicio.js"></script>
    <script src="../js/base.js"></script>
    <title>Circulo de Hierro - Inicio</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo-container">
            <img src="../images/logo1.svg" alt="Logo" class="navbar-logo" onclick="logo(); return false;">
        </div>
        <div class="navbar-right">
            <span></span>
            <!-- <a href="#" class="logout-button" onclick="cerrarSesion(); return false;">Cerrar Sesión</a> -->
        </div>
    </nav>
    <!--INDICADORES-->
    <div class="featured indicadores" id="indicadores" data-value="0">
        <span>Indicadores</span>
        <div class="row">
            <table class="tabla_indicadores">
                <tbody>
                    <tr>
                        <td rowspan="2">
                            <div class="pie-svg">
                                <svg viewBox="0 0 100 100" width="100" height="100" id="miTorta">
                                    <circle cx="50" cy="50" r="15" fill="white" />
                                </svg>
                            </div>
                        </td>
                        <td colspan="3" style="text-align: left;">
                            <span>Estado del Club</span><br>
                            <span class="estatus" style="color: #ffa91f;font-size: 12px;font-weight: bold;"></span>
                        </td>
                    </tr>
                    <tr>
                        <td style="width: 10%; text-align: left;">
                            <div class="verticales">
                                <span class="circulo-verde"></span>
                                <span class="circulo-rojo"></span>
                                <span class="circulo-cafe"></span>
                            </div>
                        </td>
                        <td style="text-align: left; width: 20%;">
                            <div class="verticales">
                                <span>En Caja</span>
                                <span>Deuda</span>
                                <span class="verticales-text">Total</span>
                            </div>
                        </td>
                        <td style="text-align: left; font-weight: bold;">
                            <div class="verticales">
                                <span class="caja"></span>
                                <span class="deuda"></span>
                                <span class="total"></span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="4">
                            Datos actualizados al: Domingo 31 de Mayo del 2026
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>
    <div class="gallery">
        <!--DOCUMENTOS-->
        <div class="featured scale-up-center" onclick="documentos();return false;" id="estatutos" data-value="1">
            <img src="../images/book.svg" alt="" class="icono">
            <div class="title">Documentos</div>
        </div>
        <!--MOVIMIENTOS-->
        <div class="featured scale-up-center" onclick="movimientos();return false;" id="movimientos" data-value="2">
            <img src="../images/movimiento.svg" alt="" class="icono">
            <div class="title_e">Movimientos</div>
        </div>
        <!--REUNIONES-->
        <div class="featured scale-up-center" id="reuniones" data-value="3">
            <img src="../images/reuniones.svg" alt="" class="icono">
            <div class="title_e" onclick="reuniones();return false;">Reuniones</div>
        </div>
        <!--EVENTOS-->
        <div class="featured scale-up-center" id="eventos" onclick="eventos();return false;" data-value="4">
            <img src="../images/eventos.svg" alt="" class="icono">
            <div class="title_e">Eventos</div>
        </div>
        <!--FICHAS-->
        <div class="featured scale-up-center" id="fichas" onclick="fichas();return false;" data-value="5">
            <img src="../images/fichas.svg" alt="" class="icono">
            <div class="title_f">Fichas</div>
        </div>
        <!--TURNOS-->
        <div class="featured scale-up-center" onclick="turnos();return false;" id="turnos" data-value="6">
            <img src="../images/turnos.svg" alt="" class="icono">
            <div class="title">Turnos</div>
        </div>
        <!--GASTOS-->
        <div class="featured scale-up-center" onclick="cuotas();return false;" id="cuotas" data-value="7">
            <img src="../images/cuotas.svg" alt="" class="icono">
            <div class="title">Cuotas</div>
        </div>
        <div class="featured scale-up-center" onclick="nuevoElemento();return false;" id="nuevoElemento" data-value="8">
            <img src="../images/cuotas.svg" alt="" class="icono">
            <div class="title">Nuevo</div>
        </div>
    </div>
</body>
